name: Apptainer images (HPC)

# Builds Apptainer/Singularity SIF images on GitHub for the tools that are NOT
# served as Galaxy-depot Singularity images (tailfindr, nanoRMS, ELIGOS),
# smoke-tests each under Apptainer, and publishes them to GHCR as OCI artifacts
# (oras://). Bioconda tools already use depot.galaxyproject.org Singularity
# images directly, so they need no build — the verify-bioconda job proves that
# path works under Apptainer too.
#
# Pre-seed an HPC cache from GHCR, e.g.:
#   apptainer pull oras://ghcr.io/ebareke/tailfindr-apptainer:1.4
#
# Safety: all matrix-derived values used in a shell are passed via env: vars;
# only static matrix values + secrets are referenced. No untrusted event input.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push SIFs to GHCR'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  APPTAINER_VERSION: '1.3.6'

jobs:
  build-sif:
    name: SIF ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tailfindr
            tag: '1.4'
            image: 'docker://docker.io/ebareke/tailfindr:1.4'
            test: 'R -e "library(tailfindr)"'
          - name: nanorms
            tag: '2.0'
            image: 'docker://docker.io/ebareke/nanorms:2.0'
            test: 'test -f /opt/nanoRMS/per_read/get_features.py'
          - name: eligos2
            tag: 'v2.1.0'
            image: 'docker://docker.io/piroonj/eligos2:v2.1.0'
            test: 'ls / >/dev/null'
          - name: uncalled4
            tag: '4.1.0'
            image: 'docker://docker.io/ebareke/uncalled4:4.1.0'
            test: 'uncalled4 --version'
    env:
      SIF_NAME: ${{ matrix.name }}
      SIF_TAG: ${{ matrix.tag }}
      SRC_IMAGE: ${{ matrix.image }}
      SMOKE_TEST: ${{ matrix.test }}
      OWNER: ${{ github.repository_owner }}
      ACTOR: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install Apptainer (pinned .deb — no JS action)
        run: |
          set -euxo pipefail
          cd /tmp
          wget -q "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb"
          sudo apt-get update
          sudo apt-get install -y "./apptainer_${APPTAINER_VERSION}_amd64.deb"
          apptainer --version

      - name: Build SIF (anonymous pull — images are public)
        run: |
          set -euxo pipefail
          df -h /
          apptainer build "${SIF_NAME}.sif" "$SRC_IMAGE"

      - name: Smoke test under Apptainer
        run: apptainer exec "${SIF_NAME}.sif" bash -lc "$SMOKE_TEST"

      - name: Publish to GHCR
        if: ${{ inputs.push }}
        run: |
          set -euxo pipefail
          printf '%s' "$GHCR_TOKEN" \
            | apptainer registry login -u "$ACTOR" --password-stdin oras://ghcr.io
          apptainer push "${SIF_NAME}.sif" \
            "oras://ghcr.io/${OWNER}/${SIF_NAME}-apptainer:${SIF_TAG}"

  verify-bioconda:
    name: Apptainer runs a biocontainer
    runs-on: ubuntu-latest
    steps:
      - name: Install Apptainer (pinned .deb — no JS action)
        run: |
          set -euxo pipefail
          cd /tmp
          wget -q "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb"
          sudo apt-get update
          sudo apt-get install -y "./apptainer_${APPTAINER_VERSION}_amd64.deb"
          apptainer --version

      - name: Pull + exec a Galaxy-depot Singularity image (NanoPlot)
        run: |
          set -euxo pipefail
          apptainer pull nanoplot.sif \
            https://depot.galaxyproject.org/singularity/nanoplot:1.42.0--pyhdfd78af_0
          apptainer exec nanoplot.sif NanoPlot --version
