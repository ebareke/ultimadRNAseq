name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nxf_version: ['24.10.5', 'latest-stable']
        profile: ['test,standard']
    env:
      NXF_VERSION: ${{ matrix.nxf_version }}
      NXF_PROFILE: ${{ matrix.profile }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: ${{ matrix.nxf_version }}

      - name: Run smoke test
        run: |
          nextflow run "$GITHUB_WORKSPACE" \
              -profile "$NXF_PROFILE" \
              --outdir ./results

      - name: Upload pipeline_info on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline_info
          path: results/pipeline_info
