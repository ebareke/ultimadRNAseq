name: Build & push containers

# Builds the three custom tool images (no Bioconda recipe) and pushes them to
# Docker Hub. Requires two repository secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub user (e.g. ebareke)
#   DOCKERHUB_TOKEN     — a Docker Hub access token (NOT stored in the repo)
#
# Trigger manually (Actions > Build & push containers > Run workflow) or on
# changes under containers/. Uses only static matrix values + secrets passed to
# actions via `with:` — no untrusted input reaches a shell.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to Docker Hub (false = build only)'
        type: boolean
        default: true
  push:
    branches: [main]
    paths: ['containers/**']

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: tailfindr
            tag: '1.4'
          - tool: nanorms
            tag: '2.0'
          - tool: uncalled4
            tag: '4.1.0'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/${{ matrix.tool }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.tool }}:${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
